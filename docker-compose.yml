version: "3.9"

services:
  db:
    image: postgres:15
    container_name: dscc_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: dscc_web
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      - db
    env_file:
      - .env

  nginx:
    image: nginx:latest
    container_name: dscc_nginx
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/static
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume: