{% extends "base.html" %}

{% block content %}
<h1>Home Page</h1>

{% if user.is_authenticated %}
<p>Logged in as {{ user.username }}</p>
<form action="{% url 'logout' %}" method="post">
    {% csrf_token %}
    <button type="submit">Logout</button>
</form>
{% else %}
<a href="{% url 'login' %}">Login</a>
{% endif %}
{% endblock %}
