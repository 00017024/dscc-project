{% extends "base.html" %}

{% block content %}
<h2>Posts</h2>

{% for post in object_list %}
    <div class="post">
        <h3>
            <a href="{% url 'post_detail' post.pk %}">
                {{ post.title }}
            </a>
        </h3>

        <p>
            by {{ post.author }} | {{ post.created_at|date:"M d, Y" }}
        </p>

        <p>{{ post.content|truncatewords:25 }}</p>

        <a href="{% url 'post_detail' post.pk %}">Read more</a>
    </div>

{% empty %}
    <p>No posts yet.</p>
{% endfor %}

{% endblock %}
