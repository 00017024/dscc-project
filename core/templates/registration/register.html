{% extends "base.html" %}

{% block content %}
<h2>Register</h2>

{% if form.errors %}
    <div style="color:red;">
        {{ form.errors }}
    </div>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Sign up</button>
</form>

<a href="{% url 'login' %}">Login</a>
{% endblock %}
