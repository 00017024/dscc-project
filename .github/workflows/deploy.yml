name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 170.168.6.70
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/dscc-project
            git pull origin main
            docker compose down
            docker compose up -d --build